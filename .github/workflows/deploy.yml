name: Deploy to VPS via FTP

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Create .env from secrets
        run: |
          cat > .env << EOF
          FLASK_SECRET_KEY=${{ secrets.FLASK_SECRET_KEY }}
          FLASK_DEBUG=false
          APP_USERNAME=${{ secrets.APP_USERNAME }}
          APP_PASSWORD=${{ secrets.APP_PASSWORD }}
          TN_STORE_ID=${{ secrets.TN_STORE_ID }}
          TN_ACCESS_TOKEN=${{ secrets.TN_ACCESS_TOKEN }}
          TN_USER_AGENT=JGOIntegration/1.0 (admin@jgo.lucasfuentes.com)
          EOF

      - name: 📂 FTP Deploy via SamKirkland
        uses: SamKirkland/FTP-Deploy-Action@4.3.0
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_TARGET_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/__pycache__/**
            **/*.pyc
            **/uploads/**
            **/outputs/**
            **/venv/**
            **/.venv/**
            **/node_modules/**
            **/ssh.txt
            **/data ftp.txt
            **/tiendanube_credentials.md
            **/sync_edit.html
            **/.env.example

      - name: ✅ Health Check
        run: |
          sleep 5
          curl -sSf https://jgo.lucasfuentes.com/api/status \
            -o /dev/null -w "Status: %{http_code}\n" \
            || echo "⚠️  Health check failed (app may still be starting / CPanel Python app not configured yet)"
