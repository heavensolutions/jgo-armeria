{% extends "base.html" %}
{% block title %}Error {{ code }}{% endblock %}
{% block content %}
<div class="min-h-[50vh] flex items-center justify-center">
    <div class="text-center">
        <div class="text-6xl mb-4">{{ code }}</div>
        <h2 class="text-xl font-semibold mb-2">Oops!</h2>
        <p class="text-gray-500 mb-6">{{ message }}</p>
        <a href="{{ url_for('dashboard') }}" class="px-6 py-2.5 bg-amber-600 hover:bg-amber-500 rounded-lg transition-colors">
            Volver al inicio
        </a>
    </div>
</div>
{% endblock %}
